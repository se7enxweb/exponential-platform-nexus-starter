# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    google_recaptcha_site_key: '%env(GOOGLE_RECAPTCHA_SITE_KEY)%'

services:
    # Fix: ezpublish.config.resolver is registered as an empty standalone ChainConfigResolver.
    # Override it as an alias to the real resolver (Ibexa\Bundle\Core\DependencyInjection\Configuration\ChainConfigResolver)
    # which has all 4 sub-resolvers (DefaultScope, SiteAccessGroup, StaticSiteAccess, GlobalScope) wired in.
    ezpublish.config.resolver:
        alias: Ibexa\Bundle\Core\DependencyInjection\Configuration\ChainConfigResolver
        public: true

    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    # ── Exponential Platform installer type "exponential-oss" ──────────────────
    # Registers the "exponential-oss" install type so that:
    #   php bin/console ibexa:install exponential-oss
    #   php bin/console ezplatform:install exponential-oss  (deprecated alias)
    # both work.  Delegates to CoreInstaller (schema + cleandata.sql seed data).
    App\Installer\ExponentialOssInstaller:
        autowire: true
        lazy: false
        parent: Ibexa\Bundle\RepositoryInstaller\Installer\DbBasedInstaller
        tags:
            - { name: ibexa.installer, type: exponential-oss }
