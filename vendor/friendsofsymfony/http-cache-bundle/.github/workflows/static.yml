name: Static analysis

on:
  push:
    branches:
      - "*.x"
  pull_request:

jobs:
  phpstan-src:
    name: PHPStan src
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull in optional dependencies and install vendors
        run: composer require jean-beru/fos-http-cache-cloudfront twig/twig symfony/console

      - name: PHPStan
        run: vendor/bin/phpstan analyze --no-progress

  phpstan-tests:
    name: PHPStan tests
    runs-on: ubuntu-latest
    env:
      REQUIRE_DEV: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install vendors
        run: composer install

      - name: PHPStan
        run: vendor/bin/phpstan analyze --no-progress -c phpstan.tests.neon.dist

  php-cs-fixer:
    name: PHP-CS-Fixer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: PHP-CS-Fixer
        uses: docker://oskarstark/php-cs-fixer-ga
        with:
          args: --dry-run --diff
