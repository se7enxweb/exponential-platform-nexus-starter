name: Frontend

on:
  push:
    branches:
      - 'master'
      - '[0-9].[0-9]+'
  pull_request: ~

jobs:
  frontend:
    name: ${{ matrix.script }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        script: ['build', 'ci']

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '14'
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - uses: ramsey/composer-install@v3
        with:
          dependency-versions: highest
          composer-options: '--prefer-dist'
          ignore-cache: 'yes'

      - run: yarn install
      - run: cp .env.dist .env

      - run: yarn run ${{ matrix.script }}
